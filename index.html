<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ăn Vặt - Thực Đơn Hôm Nay</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="main-nav-bar">
      <div class="nav-container site-container">
        <a href="index.html" class="logo-link logo-text">Ăn Vặt</a>
        <nav class="desktop-menu-links">
          <a href="index.html" class="menu-item-link active">Trang Chủ</a>
          <a href="reviews.html" class="menu-item-link">Đánh Giá</a>
          <a href="auth.html" class="menu-item-link" id="userMenuLink"
            >Đăng Nhập</a
          >
        </nav>
        <button class="btn-primary-cart" id="cartToggleBtn">
          Giỏ Hàng (<span id="cartCountTop">0</span>)
        </button>
      </div>
    </header>

    <main
      class="site-container main-layout-grid"
      style="margin-top: 30px; margin-bottom: 50px"
    >
      <aside class="sidebar-category-area">
        <h3
          class="heading-3"
          style="
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--color-burgundy-red);
          "
        >
          Danh Mục Món Ăn
        </h3>
        <div class="sidebar-menu">
          <div class="sidebar-item">
            <a href="#" class="category-btn active" data-category="all"
              >Tất Cả Món</a
            >
          </div>
          <div class="sidebar-item">
            <a href="#" class="category-btn" data-category="dac-san"
              >Đặc Sản Trộn</a
            >
          </div>
          <div class="sidebar-item">
            <a href="#" class="category-btn" data-category="an-vat"
              >Món Ăn Vặt</a
            >
          </div>
          <div class="sidebar-item">
            <a href="#" class="category-btn" data-category="giai-nhiet"
              >Đồ Uống Giải Nhiệt</a
            >
          </div>
        </div>
      </aside>

      <section class="products-display-area">
        <h2 class="heading-2" style="margin-bottom: 20px">Thực Đơn Hôm Nay</h2>
        <div class="product-grid" id="productGridContainer"></div>
      </section>
    </main>

    <div class="cart-overlay" id="cartOverlay"></div>
    <div class="cart-sidebar" id="cartSidebar">
      <div class="cart-header">
        <h3 class="heading-3">Giỏ Hàng Của Bạn</h3>
        <button class="close-btn" id="cartCloseBtn">&times;</button>
      </div>
      <div class="cart-body-items" id="cartItemsList"></div>
      <div class="cart-footer">
        <div class="cart-total-row">
          <span>Tổng cộng:</span>
          <span
            id="cartTotalPrice"
            style="font-weight: 700; color: var(--color-burgundy-red)"
            >0đ</span
          >
        </div>
        <button
          class="btn-secondary-buy"
          id="checkoutBtn"
          style="width: 100%; margin-top: 15px; height: 45px"
        >
          TIẾN HÀNH THANH TOÁN
        </button>
      </div>
    </div>

    <div class="modal-blur-bg" id="productDetailModal">
      <div class="modal-content">
        <button class="modal-close-icon" id="modalCloseBtn">&times;</button>
        <div class="modal-body">
          <div class="modal-image-zone">
            <div class="modal-discount-badge" id="modalBadge">-20%</div>
            <img src="" alt="Món ăn chi tiết" id="modalImage" />
          </div>
          <div class="modal-info-zone">
            <div>
              <span class="product-card-tag" id="modalCategory">Danh Mục</span>
              <h2 class="heading-2" id="modalTitle" style="margin: 10px 0">
                Tên Món Ăn
              </h2>
              <p
                class="body-text"
                id="modalDescription"
                style="color: var(--color-medium-gray); margin-bottom: 20px"
              >
                Mô tả chi tiết sản phẩm ăn vặt siêu ngon...
              </p>
            </div>
            <div>
              <div class="modal-price-row" style="margin-bottom: 20px">
                <span class="old-price-cross" id="modalOldPrice">0đ</span>
                <span
                  class="current-price-bold"
                  id="modalCurrentPrice"
                  style="font-size: 24px"
                  >0đ</span
                >
              </div>
              <div class="modal-action-row">
                <button
                  class="btn-primary-cart"
                  id="modalAddToCartBtn"
                  style="flex: 1; height: 45px"
                >
                  THÊM VÀO GIỎ
                </button>
                <button
                  class="btn-secondary-buy"
                  id="modalBuyNowBtn"
                  style="flex: 1; height: 45px"
                >
                  MUA NGAY
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>

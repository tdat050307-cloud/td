<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thanh Toán Đơn Hàng - Ăn Vặt</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      /* CSS riêng tối ưu cho trang thanh toán */
      .checkout-layout {
        max-width: 600px;
        margin: 40px auto;
        padding: 24px;
        background: #fff;
        border: 1px solid var(--color-dark-charcoal);
      }
      .checkout-box {
        margin-bottom: 24px;
        padding-bottom: 16px;
        border-bottom: 1px dashed var(--color-light-border);
      }
      .total-highlight {
        font-size: 24px;
        font-weight: 700;
        color: var(--color-burgundy-red);
        margin-top: 8px;
      }
      .payment-methods {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin: 20px 0;
      }
      .method-item {
        display: flex;
        align-items: center;
        gap: 12px;
        border: 1px solid var(--color-light-border);
        padding: 16px;
        cursor: pointer;
        font-weight: 700;
      }
      .method-item:hover {
        background-color: var(--color-light-gray);
      }
      .method-item input[type="radio"] {
        width: 18px;
        height: 18px;
        accent-color: var(--color-burgundy-red);
      }
      .form-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 12px;
      }
      .form-group input {
        height: 40px;
        padding: 0 12px;
        border: 1px solid var(--color-light-border);
      }
    </style>
  </head>
  <body>
    <!-- Thanh điều hướng Header -->
    <header class="main-nav-bar">
      <div class="nav-container site-container">
        <a href="index.html" class="logo-link logo-text">Ăn Vặt</a>
        <span style="color: white; font-weight: 700; letter-spacing: 1px"
          >TRANG THANH TOÁN</span
        >
      </div>
    </header>

    <!-- Nội dung chính -->
    <main class="site-container">
      <div class="checkout-layout">
        <h2 class="heading-2" style="margin-bottom: 20px">
          THÔNG TIN ĐƠN HÀNG
        </h2>

        <!-- Hiển thị số tiền từ giỏ hàng -->
        <div class="checkout-box">
          <span class="label-text">Tổng số tiền cần thanh toán:</span>
          <div class="total-highlight" id="checkoutTotalDisplay">0đ</div>
        </div>

        <!-- Form điền thông tin người mua -->
        <div class="checkout-box">
          <h3 class="heading-3" style="margin-bottom: 12px">
            Thông Tin Giao Hàng
          </h3>
          <div class="form-group">
            <label class="label-text">Họ và tên *</label>
            <input
              type="text"
              id="cusName"
              placeholder="Ví dụ: Nguyễn Văn A"
              required
            />
          </div>
          <div class="form-group">
            <label class="label-text">Số điện thoại *</label>
            <input
              type="tel"
              id="cusPhone"
              placeholder="Ví dụ: 0912345xxx"
              required
            />
          </div>
          <div class="form-group">
            <label class="label-text">Địa chỉ nhận hàng *</label>
            <input
              type="text"
              id="cusAddress"
              placeholder="Số nhà, tên đường, xã/phường..."
              required
            />
          </div>
        </div>

        <!-- Phương thức thanh toán -->
        <div class="checkout-box" style="border: none">
          <h3 class="heading-3">Chọn Phương Thức Thanh Toán</h3>
          <div class="payment-methods">
            <label class="method-item">
              <input type="radio" name="payment" value="Tiền mặt" checked />
              <span>💵 Thanh toán tiền mặt khi nhận hàng (COD)</span>
            </label>
            <label class="method-item">
              <input type="radio" name="payment" value="MoMo" />
              <span>🌸 Ví điện tử MoMo</span>
            </label>
            <label class="method-item">
              <input type="radio" name="payment" value="ZaloPay" />
              <span>💙 Ví điện tử ZaloPay</span>
            </label>
            <label class="method-item">
              <input type="radio" name="payment" value="VNPAY" />
              <span>🇻🇳 Cổng thanh toán VNPAY</span>
            </label>
          </div>
        </div>

        <!-- Nút bấm đặt hàng chính -->
        <button
          class="btn-secondary-buy"
          id="confirmPaymentBtn"
          style="height: 50px; font-size: 16px; width: 100%"
        >
          XÁC NHẬN ĐẶT HÀNG
        </button>

        <a
          href="index.html"
          style="
            display: block;
            text-align: center;
            margin-top: 15px;
            color: var(--color-medium-gray);
            text-decoration: none;
            font-size: 14px;
          "
          >Quay lại mua thêm món</a
        >
      </div>
    </main>

    <!-- Xử lý logic đặt hàng và gửi API dữ liệu -->
    <script>
      // 1. Lấy số tiền tạm tính đã lưu từ trang index sang hiển thị lên màn hình
      const pendingTotal = localStorage.getItem("pendingTotalPrice") || "0đ";
      document.getElementById("checkoutTotalDisplay").textContent =
        pendingTotal;

      // 2. Kích hoạt sự kiện khi click nút "XÁC NHẬN ĐẶT HÀNG"
      document
        .getElementById("confirmPaymentBtn")
        .addEventListener("click", () => {
          const name = document.getElementById("cusName").value.trim();
          const phone = document.getElementById("cusPhone").value.trim();
          const address = document.getElementById("cusAddress").value.trim();
          const method = document.querySelector(
            'input[name="payment"]:checked',
          ).value;

          // Kiểm tra tính hợp lệ dữ liệu đầu vào
          if (!name || !phone || !address) {
            alert("Vui lòng điền đầy đủ thông tin giao hàng nhé bạn ơi!");
            return;
          }

          // Chuẩn bị nội dung tin nhắn gửi về điện thoại của bạn
          const message =
            `🔔 CÓ ĐƠN HÀNG MỚI!\n\n` +
            `👤 Khách hàng: ${name}\n` +
            `📞 Số ĐT: ${phone}\n` +
            `📍 Địa chỉ: ${address}\n` +
            `💰 Tổng tiền: ${pendingTotal}\n` +
            `💳 Hình thức: ${method}`;

          // ========================================================
          // CẤU HÌNH TOKEN BOT TELEGRAM CỦA BẠN VÀO ĐÂY ĐỂ ĐỒNG BỘ:
          // ========================================================
          const TELEGRAM_TOKEN = "ĐIỀN_TOKEN_BOT_CỦA_BẠN_VÀO_ĐÂY";
          const TELEGRAM_CHAT_ID = "ĐIỀN_ID_CHAT_CỦA_BẠN_VÀO_ĐÂY";

          // Tiến hành bắn tin nhắn báo đơn qua API Telegram
          fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              chat_id: TELEGRAM_CHAT_ID,
              text: message,
            }),
          })
            .then((response) => {
              alert(
                `🎉 ĐẶT HÀNG THÀNH CÔNG!\n\nĐơn hàng của bạn đã được chuyển tới hệ thống quán.`,
              );
              // Xoá bộ nhớ đệm tiền đơn cũ và chuyển hướng về trang chủ
              localStorage.removeItem("pendingTotalPrice");
              window.location.href = "index.html";
            })
            .catch((err) => {
              console.error("Lỗi gửi cổng API:", err);
              // Trường hợp mạng lỗi, vẫn cho khách hoàn tất trải nghiệm mua sắm
              alert(
                `🎉 ĐẶT HÀNG THÀNH CÔNG!\n\nCửa hàng đã ghi nhận đơn hàng của bạn.`,
              );
              localStorage.removeItem("pendingTotalPrice");
              window.location.href = "index.html";
            });
        });
    </script>
    <!-- Thẻ đóng script chuẩn, không lo lỗi cú pháp hiển thị trang nữa nhé! -->
  </body>
</html>
